name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  documentation-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Markdown 경로와 src 컨텍스트 검증
        run: python3 scripts/check-doc-context.py

  mysql-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: MySQL Testcontainers 전체 테스트
        run: ./gradlew test
