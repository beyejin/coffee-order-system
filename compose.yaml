services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: coffee
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-12345678}
      TZ: UTC
    command: ["--default-time-zone=+00:00"]
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-12345678}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee_mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee_redis_data:/data

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-29092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - coffee_kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: coffee
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    depends_on:
      kafka:
        condition: service_healthy

  app1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/coffee?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-orders.paid}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-coffee-order-data-platform}
      KAFKA_CONSUMER_CONCURRENCY: ${KAFKA_CONSUMER_CONCURRENCY:-3}
      JAVA_TOOL_OPTIONS: -Duser.timezone=UTC
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/v3/api-docs >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  app2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/coffee?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-orders.paid}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-coffee-order-data-platform}
      KAFKA_CONSUMER_CONCURRENCY: ${KAFKA_CONSUMER_CONCURRENCY:-3}
      JAVA_TOOL_OPTIONS: -Duser.timezone=UTC
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/v3/api-docs >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  nginx:
    image: nginx:1.27.5-alpine
    ports:
      - "${GATEWAY_PORT:-18080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/menus"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  coffee_mysql_data:
  coffee_redis_data:
  coffee_kafka_data:
