services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: coffee
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-12345678}
      TZ: UTC
    command: ["--default-time-zone=+00:00"]
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-12345678}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - coffee_mysql_data:/var/lib/mysql

  app1:
    build: .
    environment:
      DB_URL: jdbc:mysql://mysql:3306/coffee?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      JAVA_TOOL_OPTIONS: -Duser.timezone=UTC
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/v3/api-docs >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  app2:
    build: .
    environment:
      DB_URL: jdbc:mysql://mysql:3306/coffee?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      JAVA_TOOL_OPTIONS: -Duser.timezone=UTC
      TZ: UTC
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/v3/api-docs >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  nginx:
    image: nginx:1.27.5-alpine
    ports:
      - "${GATEWAY_PORT:-18080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/menus"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  coffee_mysql_data:
